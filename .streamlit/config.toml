[theme]

base = "dark"


primaryColor = "#CFA071"


backgroundColor = "#1A1715"


secondaryBackgroundColor = "#24211E"


textColor = "#E8E3DF"

font = "sans serif"

[server]

maxUploadSize = 50
enableCORS = false

[browser]
gatherUsageStats = false

[client]
toolbarMode = "auto"
showErrorDetails = true

[ui]
hideTopBar = false
